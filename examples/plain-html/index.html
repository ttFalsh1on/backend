<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Мой сайт + Flex</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="wrap">
    <h1>Мой сайт</h1>
    <p class="hint">Подключён к Flex: <code id="api-url"></code></p>

    <form id="form">
      <input id="input" type="text" placeholder="Новая задача" required />
      <button type="submit">Добавить</button>
    </form>

    <ul id="list"></ul>
  </main>
  <script type="module" src="flex-connect.js"></script>
</body>
</html>
