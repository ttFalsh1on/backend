<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flex — Проекты</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="bg-grid" aria-hidden="true"></div>
  <div class="bg-glow" aria-hidden="true"></div>

  <header class="header">
    <div class="logo">
      <span class="logo-mark">◆</span>
      <div>
        <h1>Flex</h1>
        <p class="tagline">Аккаунты · Проекты · Задачи</p>
      </div>
    </div>
    <div class="header-actions">
      <div class="status" id="status">
        <span class="status-dot"></span>
        <span class="status-text">…</span>
      </div>
      <button type="button" class="btn btn-ghost" id="btn-logout" hidden>Выйти</button>
    </div>
  </header>

  <!-- Экран входа -->
  <main class="auth-screen" id="auth-screen">
    <section class="card auth-card">
      <div class="auth-tabs">
        <button type="button" class="auth-tab active" data-tab="login">Вход</button>
        <button type="button" class="auth-tab" data-tab="register">Регистрация</button>
      </div>

      <form id="form-login" class="auth-form">
        <input type="email" id="login-email" placeholder="Email" required autocomplete="email" />
        <input type="password" id="login-password" placeholder="Пароль" required autocomplete="current-password" />
        <button type="submit" class="btn btn-primary">Войти</button>
      </form>

      <form id="form-register" class="auth-form" hidden>
        <input type="text" id="reg-name" placeholder="Имя" required />
        <input type="email" id="reg-email" placeholder="Email" required autocomplete="email" />
        <input type="password" id="reg-password" placeholder="Пароль (мин. 6)" required minlength="6" />
        <button type="submit" class="btn btn-primary">Создать аккаунт</button>
      </form>
    </section>
  </main>

  <!-- Основное приложение -->
  <main class="layout app-screen" id="app-screen" hidden>
    <section class="card projects-bar">
      <div class="projects-row">
        <label>
          <span class="label">Проект</span>
          <select id="project-select"></select>
        </label>
        <form id="form-new-project" class="inline-form">
          <input type="text" id="new-project-name" placeholder="Новый проект" />
          <button type="submit" class="btn btn-primary">+</button>
        </form>
      </div>
      <p class="user-line" id="user-line"></p>
    </section>

    <section class="card todos-card">
      <div class="card-head">
        <h2>Задачи</h2>
        <span class="badge" id="todo-count">0</span>
      </div>

      <form class="add-form" id="add-form">
        <input type="text" id="todo-input" placeholder="Новая задача…" autocomplete="off" required />
        <button type="submit" class="btn btn-primary">Добавить</button>
      </form>

      <ul class="todo-list" id="todo-list">
        <li class="todo-empty">Выберите проект</li>
      </ul>
    </section>
  </main>

  <footer class="footer">
    <span>Flex Backend</span>
    <a href="/api" target="_blank" rel="noopener">API</a>
  </footer>

  <script src="/config.js"></script>
  <script src="/app.js"></script>
</body>
</html>
